<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียน - ระบบคำขอข้อมูลเวชระเบียน</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .page-header h1 {
      color: var(--primary);
    }
    
    .form-section {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    .form-row .form-group {
      margin-bottom: 0;
    }
    
    .form-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    
    .progress-steps {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    
    .step {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--background);
      border: 2px solid var(--border);
      font-weight: 600;
      color: var(--text-secondary);
    }
    
    .step.active {
      background-color: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    
    .step.completed {
      background-color: var(--success);
      border-color: var(--success);
      color: white;
    }
    
    .info-alert {
      background-color: #e3f2fd;
      border-left: 4px solid var(--primary);
      padding: 1rem;
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
    }
    
    .info-alert p {
      color: var(--primary);
      font-size: 0.9rem;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
  </div>

  <div class="page-container">
    <div class="page-header">
      <h1>ลงทะเบียนผู้ใช้ใหม่</h1>
      <p>กรุณากรอกข้อมูลส่วนบุคคลของท่าน</p>
    </div>

    <div class="progress-steps">
      <div class="step completed">1</div>
      <div class="step active">2</div>
      <div class="step">3</div>
    </div>

    <div class="info-alert">
      <p>📋 ข้อมูลของท่านจะถูกส่งให้เจ้าหน้าที่ตรวจสอบและอนุมัติ</p>
    </div>

    <form class="form-section" id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">ชื่อ <span class="required">*</span></label>
          <input type="text" id="firstName" name="firstName" required>
        </div>
        <div class="form-group">
          <label for="lastName">นามสกุล <span class="required">*</span></label>
          <input type="text" id="lastName" name="lastName" required>
        </div>
      </div>

      <div class="form-group">
        <label for="occupation">อาชีพ <span class="required">*</span></label>
        <select id="occupation" name="occupation" required>
          <option value="">-- เลือกอาชีพ --</option>
          <option value="doctor">แพทย์</option>
          <option value="nurse">พยาบาล</option>
          <option value="dentist">ทันตแพทย์</option>
          <option value="pharmacist">เภสัชกร</option>
          <option value="physiotherapist">นักกายภาพบำบัด</option>
          <option value="other_medical">บุคลากรทางการแพทย์อื่น</option>
          <option value="lawyer">ทนายความ</option>
          <option value="insurance">บริษัทประกันภัย</option>
          <option value="government">หน่วยงานรัฐ</option>
          <option value="other">อื่น ๆ</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="position">ตำแหน่ง</label>
          <input type="text" id="position" name="position" placeholder="เช่น หัวหน้าแผนก">
        </div>
        <div class="form-group">
          <label for="department">หน่วยงาน/สถาบัน</label>
          <input type="text" id="department" name="department" placeholder="เช่น โรงพยาบาลศรีนครินทร์">
        </div>
      </div>

      <div class="form-group">
        <label for="phone">เบอร์โทรศัพท์ <span class="required">*</span></label>
        <input type="tel" id="phone" name="phone" placeholder="0XX-XXXX-XXXX" required>
        <div class="form-help">รูปแบบ: 0XX-XXXX-XXXX</div>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="pdpaConsent" required>
          <span style="display: inline; margin-left: 0.5rem;">ยอมรับนโยบายคุ้มครองข้อมูลส่วนบุคคล (PDPA) <span class="required">*</span></span>
        </label>
        <div class="form-help">
          ข้อมูลของท่านจะถูกเก็บเป็นความลับและใช้เพื่อการประมวลผลคำร้องเท่านั้น
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="logout()">ยกเลิก</button>
        <button type="submit" class="btn btn-primary">ดำเนินการต่อ</button>
      </div>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    requireAuth();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const occupation = document.getElementById('occupation').value;
      const position = document.getElementById('position').value.trim();
      const department = document.getElementById('department').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const pdpaConsent = document.getElementById('pdpaConsent').checked;

      // Validate
      if (!firstName || !lastName || !occupation || !phone) {
        showToast('กรุณากรอกข้อมูลที่จำเป็นทั้งหมด', 'error');
        return;
      }

      if (!validatePhone(phone)) {
        showToast('รูปแบบเบอร์โทรศัพท์ไม่ถูกต้อง', 'error');
        return;
      }

      if (!pdpaConsent) {
        showToast('กรุณายอมรับนโยบายคุ้มครองข้อมูลส่วนบุคคล', 'error');
        return;
      }

      showLoading();

      const result = await api.register({
        firstName,
        lastName,
        occupation,
        position,
        department,
        phone
      });

      hideLoading();

      if (result) {
        showToast('ลงทะเบียนสำเร็จ กรุณารอการอนุมัติจากเจ้าหน้าที่', 'success');
        setTimeout(() => {
          window.location.href = 'waiting.html';
        }, 1500);
      }
    });
  </script>
</body>
</html>
